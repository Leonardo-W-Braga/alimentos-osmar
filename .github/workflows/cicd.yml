name: Entrega Final - CI/CD MySQL & Python

on: [push]

jobs:
  configuracao-ambiente:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: estoque_frutas
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 1. Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install pytest mysql-connector-python

      - name: Esperar MySQL iniciar
        run: sleep 15

      - name: 3. Configurar usuário no MySQL
        run: |
          mysql -h 127.0.0.1 -u root -proot_password -e "
          CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED BY '1234';
          GRANT ALL PRIVILEGES ON estoque_frutas.* TO 'appuser'@'%';
          FLUSH PRIVILEGES;
          "

      # ⭐ PASSO MAIS IMPORTANTE
      - name: 4. Importar banco (db_alimentos.sql)
        run: |
          mysql -h 127.0.0.1 -u appuser -p1234 estoque_frutas < db_alimentos.sql

      - name: 5. Rodar testes (opcional)
        env:
          DB_HOST: 127.0.0.1
          DB_USER: appuser
          DB_PASS: 1234
          DB_NAME: estoque_frutas
        run: pytest || true

      - name: 6. Verificar dados no banco
        run: |
          echo "Dados carregados:"
          mysql -h 127.0.0.1 -u appuser -p1234 estoque_frutas -e "
          SELECT id, fruta, codigo_completo FROM frutas;
          "