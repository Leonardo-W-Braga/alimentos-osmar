name: Entrega Final - CI/CD MySQL & Python

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest  # Item 1: Provisionamento de ambiente Linux

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: estoque_frutas
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - name: 1. Baixar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Python e Dependências (Item 4)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install pytest mysql-connector-python

      - name: 3. Instalar e Configurar MySQL (Item 2)
        run: |
          mysql -h 127.0.0.1 -u root -proot_password -e "CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED WITH mysql_native_password BY '1234';"
          mysql -h 127.0.0.1 -u root -proot_password -e "GRANT ALL PRIVILEGES ON estoque_frutas.* TO 'appuser'@'%';"
          mysql -h 127.0.0.1 -u root -proot_password -e "FLUSH PRIVILEGES;"

      # ⭐ PASSO QUE FALTAVA — popula o banco antes dos testes
      - name: 4. Popular banco via app.py
        env:
          DB_HOST: 127.0.0.1
          DB_USER: appuser
          DB_PASS: 1234
          DB_NAME: estoque_frutas
        run: python app.py

      - name: 5. Rodar Testes Pytest (Itens 5 e 6)
        env:
          DB_HOST: 127.0.0.1
          DB_USER: appuser
          DB_PASS: 1234
          DB_NAME: estoque_frutas
        run: pytest -s

      - name: 6. EXIBIR PRINT DA TABELA (Confirmação de Dados)
        run: |
          echo "=========================================================="
          echo "   RELATÓRIO DE DADOS INSERIDOS NO BANCO DE DADOS         "
          echo "=========================================================="
          mysql -h 127.0.0.1 -u appuser -p1234 estoque_frutas -t -e "SELECT * FROM alimentos;"
          echo "=========================================================="