name: Pipeline Completo

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    # Configura o MySQL como um serviço (Container Docker de alta performance)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: estoque_frutas
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências Python
        run: |
          pip install pytest mysql-connector-python
          # Caso seu projeto tenha um arquivo de requisitos:
          # pip install -r requirements.txt

      - name: Configurar Usuário do Banco
        run: |
          # Criamos o usuário 'appuser' com a senha '1234' e permissões no banco criado pelo service
          mysql -h 127.0.0.1 -u root -proot_password -e "CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED WITH mysql_native_password BY '1234';"
          mysql -h 127.0.0.1 -u root -proot_password -e "GRANT ALL PRIVILEGES ON estoque_frutas.* TO 'appuser'@'%';"
          mysql -h 127.0.0.1 -u root -proot_password -e "FLUSH PRIVILEGES;"

      - name: Criar tabelas
        run: |
          # Importa o seu arquivo SQL para o banco de dados
          mysql -h 127.0.0.1 -u appuser -p1234 estoque_frutas < db_alimentos.sql

      - name: Rodar testes
        env:
          # Variáveis de ambiente para o seu código Python ler (ex: os.getenv('DB_HOST')))
          DB_HOST: 127.0.0.1
          DB_USER: appuser
          DB_PASS: 1234
          DB_NAME: estoque_frutas
        run: pytest
