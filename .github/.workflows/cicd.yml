# name: Meu Primeiro Pipeline

# 1. Quando o pipeline deve rodar?
on:
  push:
    branches: [ "main" ] # Roda toda vez que você der 'git push'
  workflow_dispatch:      # Permite rodar clicando em um botão no site

# 2. O que o pipeline deve fazer?
jobs:
  execucao-do-script:
    runs-on: ubuntu-latest # O GitHub vai "alugar" um computador com Linux para você

    steps:
      - name: Passo 1 - Baixar o código do GitHub
        uses: actions/checkout@v4

      - name: Passo 2 - Instalar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Passo 3 - Executar o script
        run: python teste/teste_app.py